<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Artigo — Advocacia Dazilio da Vitória</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .editor-page { padding: 7rem 2rem 4rem; min-height: 100vh; }
        .editor-container { max-width: 900px; margin: 0 auto; background: var(--navy-light); border: 1px solid rgba(201,167,110,0.1); padding: 2rem; }
        .editor-container h1 { font-family: var(--font-serif); color: var(--white); font-size: 1.6rem; margin-bottom: 0.3rem; }
        .editor-container .section-line { margin-bottom: 2rem; }
        .editor-container label { display: block; color: var(--gray); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.4rem; }
        .editor-container input[type=text] { width: 100%; padding: 0.8rem 1rem; background: var(--navy); border: 1px solid rgba(201,167,110,0.15); color: var(--cream-dim); font-family: var(--font-sans); font-size: 0.95rem; margin-bottom: 1.2rem; outline: none; }
        .editor-container input[type=text]:focus { border-color: var(--gold); }
        .toolbar { display: flex; flex-wrap: wrap; gap: 0.3rem; padding: 0.6rem; background: var(--navy); border: 1px solid rgba(201,167,110,0.15); margin-bottom: 0; border-bottom: none; }
        .toolbar button, .toolbar select { background: transparent; border: 1px solid rgba(201,167,110,0.2); color: var(--cream-dim); padding: 0.4rem 0.55rem; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .toolbar button:hover, .toolbar select:hover { background: rgba(201,167,110,0.1); border-color: var(--gold); color: var(--gold); }
        .toolbar .sep { width: 1px; background: rgba(201,167,110,0.15); margin: 0 0.2rem; }
        .editor-area { min-height: 400px; max-height: 600px; overflow-y: auto; padding: 1.2rem; background: var(--navy); border: 1px solid rgba(201,167,110,0.15); color: var(--cream-dim); font-family: var(--font-sans); font-size: 1rem; line-height: 1.8; outline: none; }
        .editor-area:focus { border-color: var(--gold); }
        .editor-area img { max-width: 100%; height: auto; }
        .img-upload { margin-bottom: 1rem; }
        .img-upload label { display: inline; cursor: pointer; color: var(--gold); font-size: 0.85rem; }
        .img-upload input[type=file] { display: none; }
        .img-preview { max-width: 200px; max-height: 200px; margin-top: 0.5rem; display: none; border: 1px solid rgba(201,167,110,0.2); }
        .btn-row { display: flex; gap: 1rem; margin-top: 1.5rem; align-items: center; }
        .msg { font-size: 0.85rem; min-height: 1.2em; }
        .msg.success { color: #2ecc71; }
        .msg.error { color: #e74c3c; }
    </style>
</head>
<body>
<nav class="nav" id="nav">
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">Advocacia Dazilio da Vitória</a>
        <ul class="nav-links">
            <li><a href="index.html#sobre">Sobre</a></li>
            <li><a href="index.html#atuacao">Atuação</a></li>
            <li><a href="index.html#formacao">Formação</a></li>
            <li><a href="index.html#contato">Contato</a></li>
            <li><a href="artigos.html">Artigos</a></li>
        </ul>
        <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
</nav>

<section class="editor-page">
    <div class="editor-container">
        <h1>Editar Artigo</h1>
        <div class="section-line"></div>

        <label>Título do artigo</label>
        <input type="text" id="artTitulo" placeholder="Digite o título...">

        <label>Imagem de capa</label>
        <div class="img-upload">
            <label for="artImagem"><i class="fa-solid fa-image"></i> Trocar imagem</label>
            <input type="file" id="artImagem" accept="image/*">
            <img id="imgPreview" class="img-preview" alt="Preview">
        </div>

        <label>Conteúdo</label>
        <div class="toolbar" id="toolbar">
            <button data-cmd="bold" title="Negrito"><b>N</b></button>
            <button data-cmd="italic" title="Itálico"><i>I</i></button>
            <button data-cmd="underline" title="Sublinhado"><u>S</u></button>
            <button data-cmd="strikeThrough" title="Tachado"><s>T</s></button>
            <span class="sep"></span>
            <select data-cmd="formatBlock" title="Título">
                <option value="p">Parágrafo</option>
                <option value="h1">Título 1</option>
                <option value="h2">Título 2</option>
                <option value="h3">Título 3</option>
            </select>
            <select data-cmd="fontSize" title="Tamanho">
                <option value="3">Normal</option>
                <option value="1">Pequeno</option>
                <option value="5">Grande</option>
                <option value="7">Enorme</option>
            </select>
            <select data-cmd="fontName" title="Fonte">
                <option value="Inter, sans-serif">Inter</option>
                <option value="Playfair Display, serif">Playfair</option>
                <option value="Georgia, serif">Georgia</option>
                <option value="Courier New, monospace">Mono</option>
            </select>
            <span class="sep"></span>
            <input type="color" data-cmd="foreColor" title="Cor do texto" value="#e0dbd0">
            <input type="color" data-cmd="backColor" title="Cor de fundo" value="#0a1628">
            <span class="sep"></span>
            <button data-cmd="justifyLeft" title="Alinhar esquerda"><i class="fa-solid fa-align-left"></i></button>
            <button data-cmd="justifyCenter" title="Centralizar"><i class="fa-solid fa-align-center"></i></button>
            <button data-cmd="justifyRight" title="Alinhar direita"><i class="fa-solid fa-align-right"></i></button>
            <span class="sep"></span>
            <button data-cmd="insertUnorderedList" title="Lista"><i class="fa-solid fa-list-ul"></i></button>
            <button data-cmd="insertOrderedList" title="Lista numerada"><i class="fa-solid fa-list-ol"></i></button>
            <button data-cmd="createLink" title="Link"><i class="fa-solid fa-link"></i></button>
            <button data-cmd="removeFormat" title="Limpar formatação"><i class="fa-solid fa-eraser"></i></button>
        </div>
        <div class="editor-area" id="editor" contenteditable="true"></div>

        <div class="btn-row">
            <button class="btn btn-gold" onclick="salvarEdicao()">Salvar alterações</button>
            <a href="artigos.html" class="btn btn-outline">Cancelar</a>
            <span class="msg" id="msg"></span>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        <div class="footer-inner">
            <div class="footer-brand"><span class="footer-logo">Advocacia Dazilio da Vitória</span></div>
            <div class="footer-links">
                <a href="index.html#sobre">Sobre</a><a href="index.html#atuacao">Atuação</a>
                <a href="artigos.html">Artigos</a><a href="index.html#formacao">Formação</a><a href="index.html#contato">Contato</a>
            </div>
            <p class="footer-copy">&copy; 2026 Advocacia Dazilio da Vitória</p>
        </div>
    </div>
</footer>

<script src="firebase-config.js"></script>
<script src="script.js"></script>
<script>
(function(){
    firebase.auth().onAuthStateChanged(function(user) {
        if (!user) { window.location.href = 'artigos.html'; }
    });

    var params = new URLSearchParams(window.location.search);
    var artigoId = params.get('id');
    var artigo = null;

    db.collection('artigos').doc(artigoId).get().then(function(doc) {
        if (!doc.exists) {
            document.querySelector('.editor-container').innerHTML = '<h1>Artigo nao encontrado</h1><div class="section-line"></div><a href="artigos.html" class="btn btn-outline">Voltar</a>';
            return;
        }
        artigo = doc;
        var a = doc.data();
        var base64Image = a.imagem || null;

        document.getElementById('artTitulo').value = a.titulo;
        document.getElementById('editor').innerHTML = a.conteudo;
        if (a.imagem) {
            var preview = document.getElementById('imgPreview');
            preview.src = a.imagem;
            preview.style.display = 'block';
        }

        document.getElementById('artImagem').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { alert('Imagem muito grande. Maximo 2MB.'); return; }
            var reader = new FileReader();
            reader.onload = function(ev) {
                base64Image = ev.target.result;
                var p = document.getElementById('imgPreview');
                p.src = base64Image;
                p.style.display = 'block';
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('toolbar').addEventListener('click', function(e) {
            var btn = e.target.closest('button');
            if (!btn) return;
            e.preventDefault();
            var cmd = btn.dataset.cmd;
            if (cmd === 'createLink') {
                var url = prompt('URL do link:');
                if (url) document.execCommand(cmd, false, url);
            } else {
                document.execCommand(cmd, false, null);
            }
            document.getElementById('editor').focus();
        });

        document.getElementById('toolbar').addEventListener('change', function(e) {
            var el = e.target;
            if (el.tagName === 'SELECT') document.execCommand(el.dataset.cmd, false, el.value);
            if (el.type === 'color') document.execCommand(el.dataset.cmd, false, el.value);
            document.getElementById('editor').focus();
        });

        window.salvarEdicao = function() {
            var titulo = document.getElementById('artTitulo').value.trim();
            var conteudo = document.getElementById('editor').innerHTML.trim();
            var msg = document.getElementById('msg');
            if (!titulo) { msg.textContent = 'Digite um titulo.'; msg.className = 'msg error'; return; }
            doc.ref.update({
                titulo: titulo,
                conteudo: conteudo,
                imagem: base64Image || ''
            }).then(function() {
                msg.textContent = 'Alteracoes salvas!';
                msg.className = 'msg success';
                setTimeout(function(){ window.location.href = 'artigos.html'; }, 800);
            }).catch(function() {
                msg.textContent = 'Erro ao salvar.';
                msg.className = 'msg error';
            });
        };
    }).catch(function() {
        document.querySelector('.editor-container').innerHTML = '<h1>Erro ao carregar</h1><div class="section-line"></div><a href="artigos.html" class="btn btn-outline">Voltar</a>';
    });
})();
</script>
</body>
</html>
