<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Artigo</title><meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .editor-page{padding:7rem 2rem 4rem;min-height:100vh}
        .editor-container{max-width:900px;margin:0 auto;background:var(--navy-light);border:1px solid rgba(201,167,110,0.1);padding:2rem}
        .editor-container h1{font-family:var(--font-serif);color:var(--white);font-size:1.6rem}
        .editor-container .section-line{margin-bottom:2rem}
        .editor-container label{display:block;color:var(--gray);font-size:.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:.4rem}
        .editor-container input[type=text]{width:100%;padding:.8rem 1rem;background:var(--navy);border:1px solid rgba(201,167,110,0.15);color:var(--cream-dim);font-family:var(--font-sans);font-size:.95rem;margin-bottom:1.2rem;outline:none}
        .editor-container input:focus{border-color:var(--gold)}
        .toolbar{display:flex;flex-wrap:wrap;gap:.3rem;padding:.6rem;background:var(--navy);border:1px solid rgba(201,167,110,0.15);margin-bottom:0;border-bottom:none}
        .toolbar button,.toolbar select{background:transparent;border:1px solid rgba(201,167,110,0.2);color:var(--cream-dim);padding:.4rem .55rem;cursor:pointer;font-size:.8rem}
        .toolbar button:hover,.toolbar select:hover{background:rgba(201,167,110,0.1);border-color:var(--gold);color:var(--gold)}
        .toolbar .sep{width:1px;background:rgba(201,167,110,0.15);margin:0 .2rem}
        .editor-area{min-height:400px;max-height:600px;overflow-y:auto;padding:1.2rem;background:var(--navy);border:1px solid rgba(201,167,110,0.15);color:var(--cream-dim);font-family:var(--font-sans);font-size:1rem;line-height:1.8;outline:none}
        .editor-area:focus{border-color:var(--gold)}.editor-area img{max-width:100%;height:auto}
        .img-upload{margin-bottom:1rem}.img-upload label{display:inline;cursor:pointer;color:var(--gold);font-size:.85rem}
        .img-upload input[type=file]{display:none}
        .img-preview{max-width:200px;max-height:200px;margin-top:.5rem;border:1px solid rgba(201,167,110,0.2)}
        .btn-row{display:flex;gap:1rem;margin-top:1.5rem;align-items:center}
        .msg{font-size:.85rem}.msg.success{color:#2ecc71}.msg.error{color:#e74c3c}
    </style>
</head>
<body>
<nav class="nav" id="nav"><div class="nav-inner"><a href="index.html" class="nav-logo">Advocacia Dazilio da Vitoria</a><ul class="nav-links"><li><a href="index.html#sobre">Sobre</a></li><li><a href="index.html#atuacao">Atuacao</a></li><li><a href="index.html#formacao">Formacao</a></li><li><a href="index.html#contato">Contato</a></li><li><a href="artigos.html">Artigos</a></li></ul><button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button></div></nav>
<section class="editor-page"><div class="editor-container" id="ec"><h1>Carregando...</h1><div class="section-line"></div></div></section>
<footer class="footer"><div class="container"><div class="footer-inner"><div class="footer-brand"><span class="footer-logo">Advocacia Dazilio da Vitoria</span></div><div class="footer-links"><a href="index.html#sobre">Sobre</a><a href="index.html#atuacao">Atuacao</a><a href="artigos.html">Artigos</a><a href="index.html#formacao">Formacao</a><a href="index.html#contato">Contato</a></div><p class="footer-copy">&copy; 2026</p></div></div></footer>
<script>
var fc={};
fc.apiKey="AIza...5PqY";
fc.authDomain="site-469cc.firebaseapp.com";
fc.projectId="site-469cc";
fc.appId="1:542339087164:web:7b7d10074ab065feea3c39";
firebase.initializeApp(fc);
var _chk=false;
firebase.auth().onAuthStateChanged(function(u){});var p=new URLSearchParams(location.search),aid=p.get("id");setTimeout(function(){var u=firebase.auth().currentUser;if(!u)location.href="login.html?ret=editar-artigo.html%3Fid%3D"+aid},800);var p=new URLSearchParams(location.search),aid=p.get("id");
var arts=JSON.parse(localStorage.getItem("artigos_publicados")||"[]");
var art=arts.find(function(a){return a.id===aid});
if(!art||art.tipo==="video"){document.getElementById("ec").innerHTML="<h1>Nao encontrado</h1><div class=\"section-line\"></div><a href=\"artigos.html\" class=\"btn btn-outline\">Voltar</a>"}else{
document.title="Editar: "+art.titulo;
var bi=art.imagem||null;
var h="<label>Titulo</label><input type=\"text\" id=\"at\" value=\""+art.titulo.replace(/"/g,"&quot;")+"\">"+"<label>Imagem</label><div class=\"img-upload\"><label for=\"ai\"><i class=\"fa-solid fa-image\"></i> Trocar</label><input type=\"file\" id=\"ai\" accept=\"image/*\">"+(art.imagem?"<img id=\"ip\" class=\"img-preview\" src=\""+art.imagem+"\" style=\"display:block\">":"<img id=\"ip\" class=\"img-preview\" style=\"display:none\">")+"</div>"+"<label>Conteudo</label><div class=\"toolbar\" id=\"tb\"><button data-cmd=\"bold\"><b>N</b></button><button data-cmd=\"italic\"><i>I</i></button><button data-cmd=\"underline\"><u>S</u></button><span class=\"sep\"></span><select data-cmd=\"formatBlock\"><option value=\"p\">Paragrafo</option><option value=\"h1\">Titulo 1</option><option value=\"h2\">Titulo 2</option><option value=\"h3\">Titulo 3</option></select><select data-cmd=\"fontSize\"><option value=\"3\">Normal</option><option value=\"1\">Pequeno</option><option value=\"5\">Grande</option></select><span class=\"sep\"></span><input type=\"color\" data-cmd=\"foreColor\" value=\"#e0dbd0\"><input type=\"color\" data-cmd=\"backColor\" value=\"#0a1628\"><span class=\"sep\"></span><button data-cmd=\"justifyLeft\"><i class=\"fa-solid fa-align-left\"></i></button><button data-cmd=\"justifyCenter\"><i class=\"fa-solid fa-align-center\"></i></button><button data-cmd=\"justifyRight\"><i class=\"fa-solid fa-align-right\"></i></button><span class=\"sep\"></span><button data-cmd=\"insertUnorderedList\"><i class=\"fa-solid fa-list-ul\"></i></button><button data-cmd=\"insertOrderedList\"><i class=\"fa-solid fa-list-ol\"></i></button><button data-cmd=\"createLink\"><i class=\"fa-solid fa-link\"></i></button><button data-cmd=\"removeFormat\"><i class=\"fa-solid fa-eraser\"></i></button></div><div class=\"editor-area\" id=\"ed\" contenteditable=\"true\">"+art.conteudo+"</div><div class=\"btn-row\"><button class=\"btn btn-gold\" id=\"bsv\">Salvar</button><a href=\"artigos.html\" class=\"btn btn-outline\">Cancelar</a><span class=\"msg\" id=\"msg\"></span></div>";
document.getElementById("ec").innerHTML+=h;
document.getElementById("ai").onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){bi=ev.target.result;document.getElementById("ip").src=bi;document.getElementById("ip").style.display="block"};r.readAsDataURL(f)};
document.getElementById("tb").onclick=function(e){var b=e.target.closest("button");if(!b)return;e.preventDefault();var c=b.dataset.cmd;if(c==="createLink"){var u=prompt("URL:");if(u)document.execCommand(c,false,u)}else document.execCommand(c,false,null);document.getElementById("ed").focus()};
document.getElementById("tb").onchange=function(e){var el=e.target;if(el.tagName==="SELECT")document.execCommand(el.dataset.cmd,false,el.value);if(el.type==="color")document.execCommand(el.dataset.cmd,false,el.value);document.getElementById("ed").focus()};
document.getElementById("bsv").onclick=function(){var t=document.getElementById("at").value.trim();var c=document.getElementById("ed").innerHTML.trim();var m=document.getElementById("msg");if(!t){m.textContent="Digite um titulo";m.className="msg error";return}art.titulo=t;art.conteudo=c;if(bi!==null)art.imagem=bi;localStorage.setItem("artigos_publicados",JSON.stringify(arts));m.textContent="Salvo!";m.className="msg success";setTimeout(function(){location.href="artigos.html"},800)};
}
</script>
<script src="script.js"></script>
</body>
</html>
