<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Vídeo — Advocacia Dazilio da Vitória</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .editor-page { padding: 7rem 2rem 4rem; min-height: 100vh; }
        .editor-container { max-width: 700px; margin: 0 auto; background: var(--navy-light); border: 1px solid rgba(201,167,110,0.1); padding: 2rem; }
        .editor-container h1 { font-family: var(--font-serif); color: var(--white); font-size: 1.6rem; margin-bottom: 0.3rem; }
        .editor-container .section-line { margin-bottom: 2rem; }
        .editor-container label { display: block; color: var(--gray); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.4rem; }
        .editor-container input[type=text], .editor-container textarea { width: 100%; padding: 0.8rem 1rem; background: var(--navy); border: 1px solid rgba(201,167,110,0.15); color: var(--cream-dim); font-family: var(--font-sans); font-size: 0.95rem; margin-bottom: 1.2rem; outline: none; }
        .editor-container input:focus, .editor-container textarea:focus { border-color: var(--gold); }
        .editor-container textarea { resize: vertical; min-height: 80px; }
        .preview-box { margin: 1rem 0; border: 1px solid rgba(201,167,110,0.15); min-height: 200px; display: none; }
        .preview-box.visible { display: block; }
        .preview-box iframe { width: 100%; height: 315px; border: none; }
        .btn-row { display: flex; gap: 1rem; margin-top: 1.5rem; align-items: center; }
        .msg { font-size: 0.85rem; min-height: 1.2em; }
        .msg.success { color: #2ecc71; }
        .msg.error { color: #e74c3c; }
        .hint { color: var(--gray); font-size: 0.8rem; margin-top: -0.8rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
<nav class="nav" id="nav">
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">Advocacia Dazilio da Vitória</a>
        <ul class="nav-links">
            <li><a href="index.html#sobre">Sobre</a></li><li><a href="index.html#atuacao">Atuação</a></li>
            <li><a href="index.html#formacao">Formação</a></li><li><a href="index.html#contato">Contato</a></li>
            <li><a href="artigos.html">Artigos</a></li>
        </ul>
        <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
</nav>

<section class="editor-page">
    <div class="editor-container">
        <h1><i class="fa-solid fa-video"></i> Publicar Vídeo</h1>
        <div class="section-line"></div>

        <label>Título do vídeo</label>
        <input type="text" id="vidTitulo" placeholder="Digite o título...">

        <label>Link do vídeo (YouTube)</label>
        <input type="text" id="vidUrl" placeholder="https://www.youtube.com/watch?v=... ou https://youtu.be/...">
        <p class="hint">Cole o link completo do YouTube. Ex: https://www.youtube.com/watch?v=xxxxxxxx</p>

        <div class="preview-box" id="previewBox">
            <iframe id="previewFrame" allowfullscreen></iframe>
        </div>

        <div class="btn-row">
            <button class="btn btn-outline" id="btnPreview">Visualizar</button>
            <button class="btn btn-gold" id="btnPublicar">Publicar vídeo</button>
            <a href="artigos.html" class="btn btn-outline">Cancelar</a>
            <span class="msg" id="msg"></span>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        <div class="footer-inner">
            <div class="footer-brand"><span class="footer-logo">Advocacia Dazilio da Vitória</span></div>
            <div class="footer-links">
                <a href="index.html#sobre">Sobre</a><a href="index.html#atuacao">Atuação</a>
                <a href="artigos.html">Artigos</a><a href="index.html#formacao">Formação</a><a href="index.html#contato">Contato</a>
            </div>
            <p class="footer-copy">&copy; 2026 Advocacia Dazilio da Vitória</p>
        </div>
    </div>
</footer>

<script src="script.js"></script>
<script>
(function(){
    var firebaseConfig = {
        apiKey: "AIzaSyCUt4MLFgNYR5_0dkqBfSswDSl2Fc-5PqY"        authDomain: "site-469cc.firebaseapp.com",
        projectId: "site-469cc",
        appId: "1:542339087164:web:7b7d10074ab065feea3c39"
    };
    firebase.initializeApp(firebaseConfig);

    firebase.auth().onAuthStateChanged(function(user) {
        if (!user) { window.location.href = 'login.html'; }
    });

    function getYoutubeId(url) {
        var m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
        return m ? m[1] : null;
    }

    document.getElementById('btnPreview').addEventListener('click', function() {
        var url = document.getElementById('vidUrl').value.trim();
        var id = getYoutubeId(url);
        var box = document.getElementById('previewBox');
        var frame = document.getElementById('previewFrame');
        if (id) {
            frame.src = 'https://www.youtube.com/embed/' + id;
            box.classList.add('visible');
        } else {
            alert('Link inválido. Cole um link do YouTube.');
        }
    });

    document.getElementById('btnPublicar').addEventListener('click', function() {
        var titulo = document.getElementById('vidTitulo').value.trim();
        var url = document.getElementById('vidUrl').value.trim();
        var id = getYoutubeId(url);
        var msg = document.getElementById('msg');

        if (!titulo) { msg.textContent = 'Digite um título.'; msg.className = 'msg error'; return; }
        if (!id) { msg.textContent = 'Link do YouTube inválido.'; msg.className = 'msg error'; return; }

        var artigos = JSON.parse(localStorage.getItem('artigos_publicados') || '[]');
        var video = {
            id: 'vid_' + Date.now().toString(36),
            titulo: titulo,
            tipo: 'video',
            embedId: id,
            imagem: '',
            conteudo: '',
            data: new Date().toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric'}),
            autor: firebase.auth().currentUser.email
        };
        artigos.unshift(video);
        localStorage.setItem('artigos_publicados', JSON.stringify(artigos));

        msg.textContent = 'Vídeo publicado! Redirecionando...';
        msg.className = 'msg success';
        setTimeout(function(){ window.location.href = 'artigos.html'; }, 1000);
    });
})();
</script>
</body>
</html>
