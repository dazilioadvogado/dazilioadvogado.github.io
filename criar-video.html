<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publicar Video</title><meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="style.css">
<style>
.editor-page{padding:7rem 2rem 4rem;min-height:100vh}
.editor-container{max-width:700px;margin:0 auto;background:var(--navy-light);border:1px solid rgba(201,167,110,0.1);padding:2rem}
.editor-container h1{font-family:var(--font-serif);color:var(--white);font-size:1.6rem}
.editor-container .section-line{margin-bottom:2rem}
.editor-container label{display:block;color:var(--gray);font-size:.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:.4rem}
.editor-container input[type=text]{width:100%;padding:.8rem 1rem;background:var(--navy);border:1px solid rgba(201,167,110,0.15);color:var(--cream-dim);font-family:var(--font-sans);font-size:.95rem;margin-bottom:1.2rem;outline:none}
.editor-container input:focus{border-color:var(--gold)}
.preview-box{margin:1rem 0;border:1px solid rgba(201,167,110,0.15);min-height:200px;display:none}
.preview-box.visible{display:block}.preview-box iframe{width:100%;height:315px;border:none}
.btn-row{display:flex;gap:1rem;margin-top:1.5rem;align-items:center}
.msg{font-size:.85rem;min-height:1.2em}.msg.success{color:#2ecc71}.msg.error{color:#e74c3c}
.hint{color:var(--gray);font-size:.8rem;margin-top:-.8rem;margin-bottom:1rem}
</style></head><body>
<nav class="nav" id="nav"><div class="nav-inner"><a href="index.html" class="nav-logo">Advocacia Dazilio da Vitoria</a><ul class="nav-links"><li><a href="index.html#sobre">Sobre</a></li><li><a href="index.html#atuacao">Atuacao</a></li><li><a href="index.html#formacao">Formacao</a></li><li><a href="index.html#contato">Contato</a></li><li><a href="artigos.html">Artigos</a></li></ul><button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button></div></nav>
<section class="editor-page"><div class="editor-container">
<h1><i class="fa-solid fa-video"></i> Publicar Video</h1><div class="section-line"></div>
<label>Titulo do video</label><input type="text" id="vt" placeholder="Digite o titulo...">
<label>Link do YouTube</label><input type="text" id="vu" placeholder="https://www.youtube.com/watch?v=...">
<p class="hint">Cole o link completo do YouTube</p>
<div class="preview-box" id="pb"><iframe id="pf" allowfullscreen></iframe></div>
<div class="btn-row"><button class="btn btn-outline" id="bp">Visualizar</button><button class="btn btn-gold" id="bs">Publicar video</button><a href="artigos.html" class="btn btn-outline">Cancelar</a><span class="msg" id="msg"></span></div>
</div></section>
<footer class="footer"><div class="container"><div class="footer-inner"><div class="footer-brand"><span class="footer-logo">Advocacia Dazilio da Vitoria</span></div><div class="footer-links"><a href="index.html#sobre">Sobre</a><a href="index.html#atuacao">Atuacao</a><a href="artigos.html">Artigos</a><a href="index.html#formacao">Formacao</a><a href="index.html#contato">Contato</a></div><p class="footer-copy">&copy; 2026</p></div></div></footer>
<script>
var fc={apiKey:AIza...5PqY"authDomain:"site-469cc.firebaseapp.com",projectId:"site-469cc",appId:"1:542339087164:web:7b7d10074ab065feea3c39"};
firebase.initializeApp(fc);
firebase.auth().onAuthStateChanged(function(u){if(!u)location.href="login.html"});
function gi(u){var m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null}
document.getElementById("bp").onclick=function(){var u=document.getElementById("vu").value.trim();var i=gi(u);if(i){document.getElementById("pf").src="https://www.youtube.com/embed/"+i;document.getElementById("pb").classList.add("visible")}else alert("Link invalido")};
document.getElementById("bs").onclick=function(){var t=document.getElementById("vt").value.trim();var u=document.getElementById("vu").value.trim();var i=gi(u);var m=document.getElementById("msg");if(!t){m.textContent="Digite um titulo";m.className="msg error";return}if(!i){m.textContent="Link invalido";m.className="msg error";return}var a=JSON.parse(localStorage.getItem("artigos_publicados")||"[]");a.unshift({id:"v_"+Date.now().toString(36),titulo:t,tipo:"video",embedId:i,imagem:"",conteudo:"",data:new Date().toLocaleDateString("pt-BR"),autor:firebase.auth().currentUser.email});localStorage.setItem("artigos_publicados",JSON.stringify(a));m.textContent="Publicado!";m.className="msg success";setTimeout(function(){location.href="artigos.html"},800)};
</script>
<script src="script.js"></script>
</body></html>
