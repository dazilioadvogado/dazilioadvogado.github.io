<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigos — Advocacia Dazilio da Vitória</title>
    <meta name="description" content="Artigos jurídicos da Advocacia Dazilio da Vitória. Direito Penal, Direito Imobiliário e mais.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://dazilioadvogado.github.io/artigos.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .artigos-page { padding: 8rem 2rem 4rem; min-height: 100vh; }
        .artigos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; max-width: 1100px; margin: 0 auto; }
        .artigo-card { position: relative; border-radius: 2px; overflow: hidden; text-decoration: none; display: block; height: 260px; border: 1px solid rgba(201,167,110,0.08); transition: transform 0.35s ease, box-shadow 0.35s ease; }
        .artigo-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
        .artigo-card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 0.4s ease; }
        .artigo-card:hover .artigo-card-bg { transform: scale(1.05); }
        .artigo-card-bg.placeholder { background: linear-gradient(135deg, #162544, #0f1f3d); display: flex; align-items: center; justify-content: center; }
        .artigo-card-bg.placeholder i { font-size: 3rem; color: var(--gold); opacity: 0.3; }
        .artigo-card-bg.placeholder.video i { color: #e74c3c; }
        .artigo-card-overlay { position: absolute; inset: 0; background: linear-gradient(transparent 40%, rgba(10,22,40,0.95)); }
        .artigo-card-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem; z-index: 1; }
        .artigo-card-content h3 { font-family: var(--font-serif); font-size: 1.2rem; color: var(--white); margin-bottom: 0.4rem; line-height: 1.4; padding-right: 80px; }
        .artigo-card-content .artigo-data { font-size: 0.75rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        .artigo-card-content .artigo-tipo { font-size: 0.7rem; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 0.2rem; }
        .card-actions { position: absolute; top: 0.8rem; right: 0.8rem; z-index: 2; display: none; gap: 0.4rem; }
        .card-actions.visible { display: flex; }
        .card-actions button { background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 32px; height: 32px; border-radius: 3px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .card-actions .btn-edit:hover { background: var(--gold); color: var(--navy); border-color: var(--gold); }
        .card-actions .btn-del:hover { background: #e74c3c; border-color: #e74c3c; }
        .artigo-placeholder { text-align: center; color: var(--gray); padding: 4rem 2rem; font-style: italic; grid-column: 1 / -1; }
        .admin-fixed { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; }
        .admin-fixed a { display: inline-block; background: var(--navy-mid); color: var(--gold); border: 1px solid var(--gold); padding: 0.6rem 1.2rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; transition: var(--transition); }
        .admin-fixed a:hover { background: var(--gold); color: var(--navy); }
        .admin-fixed a.logged-in { color: #2ecc71; border-color: #2ecc71; }
        .admin-fixed a.logged-in:hover { background: #2ecc71; color: var(--navy); }
        .admin-actions { position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 999; display: none; gap: 0.6rem; }
        .admin-actions.visible { display: flex; }
        .admin-actions a { display: inline-block; background: var(--navy-mid); color: #2ecc71; border: 1px solid #2ecc71; padding: 0.6rem 1.2rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; transition: var(--transition); }
        .admin-actions a:hover { background: #2ecc71; color: var(--navy); }
        .admin-actions a.video-btn { color: #e74c3c; border-color: #e74c3c; }
        .admin-actions a.video-btn:hover { background: #e74c3c; color: #fff; }
    </style>
</head>
<body>
<nav class="nav" id="nav">
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">Advocacia Dazilio da Vitória</a>
        <ul class="nav-links">
            <li><a href="index.html#sobre">Sobre</a></li>
            <li><a href="index.html#atuacao">Atuação</a></li>
            <li><a href="index.html#formacao">Formação</a></li>
            <li><a href="index.html#contato">Contato</a></li>
            <li><a href="artigos.html">Artigos</a></li>
        </ul>
        <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
</nav>

<section class="artigos-page">
    <div class="container">
        <div class="section-header">
            <span class="section-tag">Artigos</span>
            <h1>Artigos e Vídeos</h1>
            <div class="section-line"></div>
        </div>
        <div class="artigos-grid" id="artigosGrid"></div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        <div class="footer-inner">
            <div class="footer-brand"><span class="footer-logo">Advocacia Dazilio da Vitória</span></div>
            <div class="footer-links">
                <a href="index.html#sobre">Sobre</a><a href="index.html#atuacao">Atuação</a>
                <a href="artigos.html">Artigos</a><a href="index.html#formacao">Formação</a><a href="index.html#contato">Contato</a>
            </div>
            <p class="footer-copy">&copy; 2026 Advocacia Dazilio da Vitória</p>
        </div>
    </div>
</footer>

<div class="admin-fixed"><a href="login.html" id="adminBtn">Acesso administrativo</a></div>
<div class="admin-actions" id="adminActions">
    <a href="criar-artigo.html">Publicar artigo</a>
    <a href="criar-video.html" class="video-btn">Publicar vídeo</a>
</div>

<script src="script.js"></script>
<script>
(function(){
    var firebaseConfig = {
        apiKey: "AIzaSyCUt4MLFgNYR5_0dkqBfSswDSl2Fc-5PqY",
        authDomain: "site-469cc.firebaseapp.com",
        projectId: "site-469cc",
        appId: "1:542339087164:web:7b7d10074ab065feea3c39"
    };
    firebase.initializeApp(firebaseConfig);

    var btn = document.getElementById('adminBtn');
    var adminActions = document.getElementById('adminActions');
    var isAdmin = false;

    btn.addEventListener('click', function(e) {
        if (firebase.auth().currentUser) {
            e.preventDefault();
            firebase.auth().signOut().then(function(){ window.location.reload(); });
        }
    });

    function loadContent() {
        var artigos = JSON.parse(localStorage.getItem('artigos_publicados') || '[]');
        var videos = JSON.parse(localStorage.getItem('videos_publicados') || '[]');
        var grid = document.getElementById('artigosGrid');

        // Merge and sort by date (newest first)
        var all = [];
        artigos.forEach(function(a) { a._tipo = 'artigo'; all.push(a); });
        videos.forEach(function(v) { v._tipo = 'video'; all.push(v); });
        all.sort(function(a,b) {
            return new Date(b._created || 0) - new Date(a._created || 0);
        });

        if (all.length === 0) {
            grid.innerHTML = '<p class="artigo-placeholder">Nenhum artigo ou vídeo publicado ainda.</p>';
            return;
        }

        var html = '';
        all.forEach(function(item) {
            var isVideo = item._tipo === 'video';
            var link = isVideo ? 'artigo.html?vid=' + item.id : 'artigo.html?id=' + item.id;
            var bgStyle = item.imagem ? ' style="background-image:url(' + item.imagem + ')"' : '';
            var bgClass = item.imagem ? 'artigo-card-bg' : (isVideo ? 'artigo-card-bg placeholder video' : 'artigo-card-bg placeholder');
            var icon = item.imagem ? '' : (isVideo ? '<i class="fa-solid fa-play"></i>' : '<i class="fa-solid fa-newspaper"></i>');
            var tipo = isVideo ? 'VÍDEO' : 'ARTIGO';

            html +=
                '<div class="artigo-card" data-id="' + item.id + '" data-tipo="' + item._tipo + '">' +
                    '<div class="' + bgClass + '"' + bgStyle + '>' + icon + '</div>' +
                    '<div class="artigo-card-overlay"></div>' +
                    '<div class="artigo-card-content">' +
                        '<span class="artigo-tipo">' + tipo + '</span>' +
                        '<h3>' + item.titulo + '</h3>' +
                        '<span class="artigo-data">' + item.data + '</span>' +
                    '</div>' +
                    '<div class="card-actions' + (isAdmin ? ' visible' : '') + '">' +
                        '<button class="btn-edit" title="Editar" data-id="' + item.id + '" data-tipo="' + item._tipo + '"><i class="fa-solid fa-pen"></i></button>' +
                        '<button class="btn-del" title="Excluir" data-id="' + item.id + '" data-tipo="' + item._tipo + '"><i class="fa-solid fa-trash"></i></button>' +
                    '</div>' +
                '</div>';
        });
        grid.innerHTML = html;

        // Click to navigate (not on buttons)
        grid.querySelectorAll('.artigo-card').forEach(function(card) {
            card.addEventListener('click', function(e) {
                if (e.target.closest('button')) return;
                var id = card.dataset.id;
                var tipo = card.dataset.tipo;
                window.location.href = tipo === 'video' ? 'artigo.html?vid=' + id : 'artigo.html?id=' + id;
            });
        });

        // Delete
        grid.querySelectorAll('.btn-del').forEach(function(b) {
            b.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!confirm('Tem certeza que deseja excluir este ' + (b.dataset.tipo === 'video' ? 'vídeo' : 'artigo') + '?')) return;
                var key = b.dataset.tipo === 'video' ? 'videos_publicados' : 'artigos_publicados';
                var items = JSON.parse(localStorage.getItem(key) || '[]');
                items = items.filter(function(i) { return i.id !== b.dataset.id; });
                localStorage.setItem(key, JSON.stringify(items));
                loadContent();
            });
        });

        // Edit
        grid.querySelectorAll('.btn-edit').forEach(function(b) {
            b.addEventListener('click', function(e) {
                e.stopPropagation();
                var tipo = b.dataset.tipo;
                var page = tipo === 'video' ? 'editar-video.html' : 'editar-artigo.html';
                window.location.href = page + '?id=' + b.dataset.id;
            });
        });
    }

    firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
            isAdmin = true;
            btn.textContent = 'LOGADO';
            btn.className = 'logged-in';
            btn.title = 'Clique para sair (' + user.email + ')';
            adminActions.classList.add('visible');
        } else {
            isAdmin = false;
            btn.textContent = 'Acesso administrativo';
            btn.className = '';
            btn.href = 'login.html';
            btn.title = '';
            adminActions.classList.remove('visible');
        }
        loadContent();
    });

    loadContent();
})();
</script>
</body>
</html>
